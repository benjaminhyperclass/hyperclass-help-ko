name: GHL Help 문서 자동 업데이트

on:
  schedule:
    - cron: '0 21 1 * *'      # 매월 1일 UTC 21:00 = KST 2일 06:00
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'dry-run'
        type: choice
        options: [dry-run, new-only, full]
      tier:
        description: 'Tier (1-4, 비워두면 전체)'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: state 파일 복원 (캐시)
        uses: actions/cache@v4
        with:
          path: data/updater-state.json
          key: updater-state-${{ github.run_id }}
          restore-keys: updater-state-

      - name: 상태 확인
        run: python scripts/ghl-help-updater.py --status
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_PATH: ${{ github.workspace }}
          VAULT_PATH: ${{ github.workspace }}
          STATE_FILE: ${{ github.workspace }}/data/updater-state.json
          REPORT_DIR: ${{ github.workspace }}/data/reports

      - name: 실행 (스케줄 — 매월 Tier 1 신규만)
        if: github.event_name == 'schedule'
        run: python scripts/ghl-help-updater.py --tier 1 --new-only --no-push
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_PATH: ${{ github.workspace }}
          VAULT_PATH: ${{ github.workspace }}
          STATE_FILE: ${{ github.workspace }}/data/updater-state.json
          REPORT_DIR: ${{ github.workspace }}/data/reports

      - name: 실행 (수동)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TIER_ARG=""
          [ -n "${{ inputs.tier }}" ] && TIER_ARG="--tier ${{ inputs.tier }}"
          case "${{ inputs.mode }}" in
            dry-run)  python scripts/ghl-help-updater.py --dry-run $TIER_ARG --no-push ;;
            new-only) python scripts/ghl-help-updater.py --new-only $TIER_ARG --no-push ;;
            full)     python scripts/ghl-help-updater.py $TIER_ARG --no-push ;;
          esac
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO_PATH: ${{ github.workspace }}
          VAULT_PATH: ${{ github.workspace }}
          STATE_FILE: ${{ github.workspace }}/data/updater-state.json
          REPORT_DIR: ${{ github.workspace }}/data/reports

      - name: SUMMARY.md 재생성
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'dry-run'
        run: python scripts/generate-summary.py --repo ${{ github.workspace }} || true

      - name: 화이트라벨 검증 (신규/수정 파일)
        run: |
          python3 - << 'PYEOF'
          import subprocess, os, sys
          sys.path.insert(0, 'scripts')
          from whitelabel import whitelabel_check

          changed = subprocess.run(
              ['git', 'diff', '--cached', '--name-only', '--diff-filter=AM'],
              capture_output=True, text=True
          ).stdout.strip().split('\n')
          # staged 없으면 unstaged 체크
          if not any(changed):
              changed = subprocess.run(
                  ['git', 'diff', '--name-only', '--diff-filter=AM'],
                  capture_output=True, text=True
              ).stdout.strip().split('\n')

          md_files = [f for f in changed if f.endswith('.md') and f.startswith('docs/')]
          total_v = 0
          for f in md_files:
              if os.path.exists(f):
                  with open(f, encoding='utf-8') as fh:
                      v = whitelabel_check(fh.read())
                  total_v += len(v)
                  if v:
                      print(f'⚠️  {f}: {len(v)}건')
                      for x in v[:2]:
                          print(f'   [{x["type"]}] {x["context"][:60]}')

          summary = f'## 화이트라벨 검증\n검사 파일: {len(md_files)}개  위반: {total_v}건'
          summary += '\n✅ 이상 없음' if total_v == 0 else f'\n⚠️  {total_v}건 잔존 (자동 교체 필요)'
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              f.write(summary + '\n')
          PYEOF

      - name: 커밋 & 푸시
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'dry-run'
        run: |
          git config user.name "Hyperclass Bot"
          git config user.email "bot@hyperclass.ai"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "[Auto] Help 업데이트 ($(date +%Y-%m-%d))"
            git push
          else
            echo "변경 없음 — 커밋 스킵"
          fi

      - name: 요약
        if: always()
        run: |
          {
            echo "## Help 업데이터 완료 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "- 모드: ${{ github.event_name }}"
            python scripts/ghl-help-updater.py --status 2>/dev/null || true
          } >> $GITHUB_STEP_SUMMARY
